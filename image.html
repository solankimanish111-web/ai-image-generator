<!DOCTYPE html>
<html>
<head>
  <title>AI Image Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }
    input {
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🔥 AI Image Generator</h1>

<input id="prompt" placeholder="Enter prompt (lion, car...)">
<button onclick="generate()">Generate</button>

<br><br>
<img id="img" width="300">

<script>
function generate() {
  let prompt = document.getElementById("prompt").value;

  // free image source (demo AI)
  document.getElementById("img").src =
  "https://source.unsplash.com/400x400/?" + prompt;
}
</script>

</body>
</html>
