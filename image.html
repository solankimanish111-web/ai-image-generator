<!DOCTYPE html>
<html>
<head>
<title>AI Image Generator</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>AI Image Generator</h2>

<input id="prompt" placeholder="Type image prompt">

<br><br>

<button onclick="generate()">Generate Image</button>

<br><br>

<img id="result" width="400">

<script>

function generate(){

var text=document.getElementById("prompt").value;

var url="https://image.pollinations.ai/prompt/"+text;

document.getElementById("result").src=url;

}

</script>
<script>
async function generateImage() {
    let prompt = document.getElementById("prompt").value;

    let response = await fetch("/api/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt: prompt })
    });

    let data = await response.json();

    document.getElementById("img").src = data.data[0].url;
}
</script>
</body>
</html>
