<!DOCTYPE html>
<html>
<head>
  <title>AI Image Generator</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: cyan;
      cursor: pointer;
      margin-left: 10px;
    }

    img {
      margin-top: 20px;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🔥 AI Image Generator</h1>

<input id="prompt" placeholder="Enter prompt">
<button onclick="gen()">Generate</button>

<br><br>

<img id="img">

<script>
function gen() {
  let p = document.getElementById("prompt").value;

  if (!p) {
    alert("Enter prompt");
    return;
  }

  let url =
    "https://image.pollinations.ai/prompt/" + encodeURIComponent(p);

  document.getElementById("img").src = url;
}
</script>

</body>
</html>
