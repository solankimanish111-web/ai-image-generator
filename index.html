<!DOCTYPE html>
<html>
<head>
<title>AI Generator</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:100px;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:350px;
margin:auto;
}

button{
width:200px;
padding:12px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.imgbtn{
background:#22c55e;
color:white;
}

.videobtn{
background:#3b82f6;
color:white;
}

button:hover{
opacity:0.8;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Generator</h2>

<button class="imgbtn" onclick="image()">🖼 Image Generator</button>

<button class="videobtn" onclick="video()">🎬 Video Generator</button>

</div>

<script>

function image(){
alert("Image Generator Open");
}

function video(){
alert("Video Generator Open");
}

</script>

</body>
</html>
