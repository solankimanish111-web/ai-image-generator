<!DOCTYPE html>

<html>

<head>
<title>Manish AI Image Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
background: grey;
}

h1{
margin-top:50px;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

img{
width:300px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>AI Image Generator</h1>

<input id="prompt" placeholder="Type animal or nature">

<br><br>

<button onclick="generate()">Generate Image</button>

<br><br>

<img id="result">

<script>

function generate(){

var text = document.getElementById("prompt").value;

var url = "https://picsum.photos/400?random=" + Math.floor(Math.random()*1000);

document.getElementById("result").src = url;

}

</script>

</body>
</html>
