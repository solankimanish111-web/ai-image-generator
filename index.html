<!DOCTYPE html>
<html>
<head>
<title> AI Image Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:F2F2F2;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
background:PINK;
color:white;
border:none;
}

img{
width:300px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>AI Image Generator</h1>

<input id="prompt" placeholder="Type prompt">

<br><br>

<button onclick="generate()">Generate</button>

<br><br>

<img id="result">

<script>

function generate(){

var text=document.getElementById("prompt").value;

var url="https://image.pollinations.ai/prompt/"+encodeURIComponent(text);

document.getElementById("result").src=url;

}

</script>

</body>
</html>
