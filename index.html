<!DOCTYPE html>
<html>
<head>
<title>AI Generator</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:80px;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:420px;
margin:auto;
}

input{
width:80%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.imgbtn{
background:#22c55e;
color:white;
}

.videobtn{
background:#3b82f6;
color:white;
}

img{
margin-top:20px;
width:100%;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Generator</h2>

<input id="prompt" placeholder="Type your prompt">

<br>

<button class="imgbtn" onclick="generateImage()">🖼 Generate Image</button>

<button class="videobtn" onclick="generateVideo()">🎬 Video Generator</button>

<br>

<img id="result">

</div>

<script>

function generateImage(){

var text=document.getElementById("prompt").value;

var url="https://image.pollinations.ai/prompt/"+text;

document.getElementById("result").src=url;

}

function generateVideo(){

alert("Video generator coming soon");

}

</script>

</body>
</html>
