<h1>🔥 REAL AI IMAGE GENERATOR</h1>

<input id="prompt" placeholder="Enter prompt">
<button onclick="gen()">Generate</button>

<p id="status"></p>
<img id="img" width="300">

<script>
async function gen() {
  let p = document.getElementById("prompt").value;

  document.getElementById("status").innerText = "Generating AI image...";

  let res = await fetch("https://your-backend-url/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: p })
  });

  let data = await res.json();

  document.getElementById("img").src = data.image;

  document.getElementById("status").innerText = "Done ✅";
}
</script>
