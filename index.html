<!DOCTYPE html>
<html>
<head>
<title>AI Image Generator</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding-top:80px;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:400px;
margin:auto;
}

input{
width:80%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
padding:12px 20px;
margin-top:15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

img{
margin-top:20px;
width:100%;
border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Image Generator</h2>

<input id="prompt" placeholder="Type your image prompt">

<br>

<button onclick="generate()">Generate Image</button>

<br>

<img id="result">

</div>

<script>

function generate(){

var text = document.getElementById("prompt").value;

var url = "https://image.pollinations.ai/prompt/" + text;

document.getElementById("result").src = url;

}

</script>

</body>
</html>
