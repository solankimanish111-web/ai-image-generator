<!DOCTYPE html>
<html>
<head>
<title>AI Video Generator</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>AI Video Generator</h2>

<input id="prompt" placeholder="Type video prompt">

<br><br>

<button onclick="video()">Generate Video</button>

<p id="msg"></p>

<script>

function video(){

var text=document.getElementById("prompt").value;

document.getElementById("msg").innerHTML="Video generation for: "+text+" (demo)";

}

</script>

</body>
</html>
